# Never let the browser cache the attacker PoC pages. Without this, Chrome holds
# onto an old copy of e.g. csrf_delete.html and silently re-runs a stale exploit
# — which looks like "the CSRF did nothing" even after the file was fixed.
<Directory /var/www/html/crypto-tracker/attacker>
    Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
    Header set Pragma "no-cache"
</Directory>
